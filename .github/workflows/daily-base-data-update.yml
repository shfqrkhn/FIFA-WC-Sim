name: Daily BASE_DATA update

on:
  workflow_dispatch:
  schedule:
    # Morning run: 11:37 UTC is 07:37 America/Montreal during EDT.
    # GitHub cron is UTC only; the same time is 06:37 during EST.
    - cron: '37 11 * * *'
    # Safety run: catches delayed score feeds or a missed/delayed morning run.
    # 17:37 UTC is 13:37 America/Montreal during EDT, 12:37 during EST.
    - cron: '37 17 * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: base-data-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: python3 -m py_compile scripts/*.py
      - run: for f in scripts/*.mjs; do node --check "$f"; done
      - run: node scripts/update-base-data.mjs
      - run: python3 scripts/test_idempotence.py
      - run: node scripts/validate-calibration.mjs
      - run: node tests/run-all.mjs
      - run: node scripts/run-sim.mjs
      - run: python3 scripts/validate_base_data.py
      - name: Write update summary
        if: always()
        run: node scripts/write-workflow-summary.mjs >> "$GITHUB_STEP_SUMMARY" || true
      - name: Open or update validated BASE_DATA PR
        # Candidate artifacts are constrained in scripts/publish-base-data-pr.mjs:
        # docs/index.html data/latest-update.json data/update-health.json data/prediction-audit.json data/calibration-state.json data/backtest-audit.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          node scripts/publish-base-data-pr.mjs
          --branch automation/daily-base-data-update
          --title "Daily World Cup BASE_DATA update"
          --message "Daily World Cup BASE_DATA update"
