name: Daily BASE_DATA update

on:
  workflow_dispatch:
  schedule:
    - cron: '17 8 11-30 6 *'
    - cron: '17 8 1-20 7 *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/validate_base_data.py
      - run: python3 scripts/apply_scoreboard.py
      - run: python3 scripts/enrich_predictions.py
      - run: python3 scripts/enrich_weather.py
      - run: python3 scripts/validate_base_data.py
      - run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/index.html
          if [ -f data/latest-update.json ]; then git add data/latest-update.json; fi
          git commit -m 'Daily World Cup BASE_DATA update'
          git push
