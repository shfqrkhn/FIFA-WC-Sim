name: Daily BASE_DATA update

on:
  workflow_dispatch:
  schedule:
    # Morning run: 11:37 UTC is 07:37 America/Montreal during EDT.
    # GitHub cron is UTC only; the same time is 06:37 during EST.
    - cron: '37 11 * * *'
    # Safety run: catches delayed score feeds or a missed/delayed morning run.
    # 17:37 UTC is 13:37 America/Montreal during EDT, 12:37 during EST.
    - cron: '37 17 * * *'

permissions:
  contents: write

concurrency:
  group: daily-base-data-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: python3 -m py_compile scripts/*.py
      - run: for f in scripts/*.mjs; do node --check "$f"; done
      - run: node scripts/update-base-data.mjs
      - run: python3 scripts/test_idempotence.py
      - run: node scripts/validate-calibration.mjs
      - run: node tests/run-all.mjs
      - run: node scripts/run-sim.mjs
      - run: python3 scripts/validate_base_data.py
      - run: |
          if git diff --quiet -- docs/index.html data/latest-update.json data/update-health.json data/prediction-audit.json data/calibration-state.json; then
            echo "No validated BASE_DATA changes to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A -- docs/index.html data/latest-update.json data/update-health.json data/prediction-audit.json data/calibration-state.json
          git commit -m 'Daily World Cup BASE_DATA update'
          git push
