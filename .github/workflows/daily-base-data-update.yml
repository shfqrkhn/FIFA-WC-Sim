name: Daily BASE_DATA update

on:
  workflow_dispatch:
  schedule:
    - cron: '17 8 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep -q 'Whole Tournament Simulator' docs/index.html
      - run: grep -q 'data-tab="groups"' docs/index.html
      - run: grep -q 'data-tab="bracket"' docs/index.html
      - run: grep -q 'data-tab="prob"' docs/index.html
      - run: grep -q 'data-tab="stats"' docs/index.html
      - run: python3 scripts/apply_scoreboard.py
      - run: grep -q 'Whole Tournament Simulator' docs/index.html
      - run: grep -q 'data-tab="groups"' docs/index.html
      - run: grep -q 'data-tab="bracket"' docs/index.html
      - run: grep -q 'data-tab="prob"' docs/index.html
      - run: grep -q 'data-tab="stats"' docs/index.html
      - run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/index.html data/latest-update.json
          git commit -m 'Daily World Cup BASE_DATA update'
          git push
