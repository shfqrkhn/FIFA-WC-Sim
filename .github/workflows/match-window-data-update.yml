name: Match-window BASE_DATA update

on:
  workflow_dispatch:
  schedule:
    # North American World Cup match windows can span Montreal morning through late night.
    # GitHub cron is UTC only; local America/Montreal time shifts with DST.
    # The script no-ops unless a match is near a pre-kickoff/post-match slot or inside the delayed-result recovery window.
    - cron: '*/30 11-23 * 6,7 *'
    - cron: '*/30 8-10 * 6,7 *'
    - cron: '*/30 0-7 * 6,7 *'

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: base-data-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Reconcile immutable audit records from automation branches
        run: |
          git fetch origin '+refs/heads/automation/*:refs/remotes/origin/automation/*'
          node scripts/reconcile-prediction-audits.mjs \
            --source-ref origin/automation/daily-base-data-update \
            --source-ref origin/automation/match-window-base-data-update
      - run: node --check scripts/match-window-update.mjs
      - run: node scripts/match-window-update.mjs
      - run: python3 scripts/validate_base_data.py
      - run: node scripts/validate-calibration.mjs
      - run: node tests/run-all.mjs
      - run: node scripts/run-sim.mjs
      - name: Write update summary
        if: always()
        run: node scripts/write-workflow-summary.mjs >> "$GITHUB_STEP_SUMMARY" || true
      - name: Open or update validated BASE_DATA PR
        # Candidate artifacts are constrained in scripts/publish-base-data-pr.mjs:
        # docs/index.html data/latest-update.json data/update-health.json data/prediction-audit.json data/calibration-state.json data/backtest-audit.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          node scripts/publish-base-data-pr.mjs
          --branch automation/match-window-base-data-update
          --title "Match-window World Cup BASE_DATA update"
          --message "Match-window World Cup BASE_DATA update"
