name: Daily World Cup data update

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. 08:17 UTC = 04:17 America/Montreal during the 2026 World Cup window.
    - cron: '17 8 * * *'

permissions:
  contents: write

concurrency:
  group: world-cup-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Stop after World Cup window
        id: window
        shell: bash
        run: |
          today_montreal="$(TZ=America/Montreal date +%F)"
          if [[ "$today_montreal" > "2026-07-20" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "World Cup update window ended on 2026-07-20."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.window.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.window.outputs.run == 'true'
        with:
          node-version: '22'

      - name: Fetch latest tournament data
        if: steps.window.outputs.run == 'true'
        run: node scripts/update-data.mjs

      - name: Run simulator smoke test
        if: steps.window.outputs.run == 'true'
        run: node scripts/run-sim.mjs

      - name: Build standalone HTML
        if: steps.window.outputs.run == 'true'
        run: node scripts/build-html.mjs

      - name: Validate artifact
        if: steps.window.outputs.run == 'true'
        run: node scripts/validate.mjs

      - name: Commit updated simulator data
        if: steps.window.outputs.run == 'true'
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No tournament data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/latest-update.json data/latest-simulation.json
          git commit -m "Daily World Cup simulator data update"
          git push
